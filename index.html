<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Data Gatherer</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #0066cc; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #log { background: #f4f4f4; padding: 15px; border-radius: 4px; height: 300px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; margin-top: 20px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Dictionary Data Gatherer</h1>
    <p>This tool will connect to the WordPress REST API using your credentials, scrape all posts, automatically identify the language based on the CSS classes added by the server, and download the resulting JSON data.</p>
    
    <button id="startBtn">Start Scraping</button>
    <div id="log">Waiting to start...</div>

    <script src="scraper.js"></script>
</body>
</html>
